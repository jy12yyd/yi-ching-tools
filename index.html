<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="baidu_union_verify" content="a1c963a04e6b64076e3edd9446207b54">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蹇杨的工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tab-btn {
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border-color: #ffd700;
            font-weight: bold;
        }

        .ziwei-input-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .ziwei-input-container h2 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 120px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            font-family: inherit;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .ziwei-result {
            margin-top: 30px;
        }

        .ziwei-header {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .ziwei-header h2 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .ziwei-header p {
            color: #ccc;
        }

        .ziwei-palace h3,
        .ziwei-stars h3,
        .ziwei-analysis h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .palace-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .palace-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        .palace-card .palace-name {
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 5px;
        }

        .palace-card .palace-stars {
            color: #fff;
            font-size: 12px;
            line-height: 1.6;
        }

        .palace-card .palace-stars .star {
            display: block;
            margin: 2px 0;
        }

        .palace-card .palace-stars .zhang {
            color: #ff6b6b;
        }

        .palace-card .palace-stars .hua {
            color: #00ff88;
        }

        .stars-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .star-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .star-item .star-name {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .star-item .star-location {
            color: #ccc;
            font-size: 13px;
        }

        .ziwei-analysis {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .analysis-content {
            line-height: 1.8;
            color: #ccc;
        }

        .analysis-content .item {
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .analysis-content .item h4 {
            color: #ffd700;
            margin-bottom: 8px;
        }

        .bagua-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0;
            perspective: 1000px;
        }

        .bagua {
            width: 300px;
            height: 300px;
            position: relative;
            animation: rotate 20s linear infinite;
        }

        .bagua::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.8) 0%, rgba(255,140,0,0.6) 50%, rgba(255,69,0,0.4) 100%);
            box-shadow: 0 0 50px rgba(255,215,0,0.8), 0 0 100px rgba(255,140,0,0.6), inset 0 0 50px rgba(255,215,0,0.4);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bagua-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #ffd700;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            background: linear-gradient(45deg, transparent 45%, rgba(255,215,0,0.1) 50%, transparent 55%);
        }

        .bagua-ring:nth-child(2) {
            width: 85%;
            height: 85%;
            top: 7.5%;
            left: 7.5%;
            animation-delay: 0.3s;
            border-width: 3px;
        }

        .bagua-ring:nth-child(3) {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            animation-delay: 0.6s;
            border-width: 4px;
        }

        .bagua-ring:nth-child(4) {
            width: 55%;
            height: 55%;
            top: 22.5%;
            left: 22.5%;
            animation-delay: 0.9s;
            border-width: 5px;
        }

        .bagua-ring:nth-child(5) {
            width: 40%;
            height: 40%;
            top: 30%;
            left: 30%;
            animation-delay: 1.2s;
            border-width: 6px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .bagua-yin-yang {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ffd700 0%, #ff8c00 100%);
            box-shadow: 0 0 30px rgba(255,215,0,0.8), inset 0 0 30px rgba(255,255,255,0.3);
            z-index: 2;
        }

        .bagua-yin-yang::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .bagua-yin-yang::after {
            content: '☯';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
            z-index: 3;
        }

        .bagua-trigrams {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bagua-trigram {
            position: absolute;
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            font-family: monospace;
        }

        .bagua-trigram:nth-child(1) { top: 10%; left: 50%; transform: translateX(-50%); }
        .bagua-trigram:nth-child(2) { top: 25%; right: 25%; }
        .bagua-trigram:nth-child(3) { top: 50%; right: 10%; transform: translateY(-50%); }
        .bagua-trigram:nth-child(4) { bottom: 25%; right: 25%; }
        .bagua-trigram:nth-child(5) { bottom: 10%; left: 50%; transform: translateX(-50%); }
        .bagua-trigram:nth-child(6) { bottom: 25%; left: 25%; }
        .bagua-trigram:nth-child(7) { top: 50%; left: 10%; transform: translateY(-50%); }
        .bagua-trigram:nth-child(8) { top: 25%; left: 25%; }

        .btn {
            display: block;
            padding: 18px 36px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 auto;
        }

        .input-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-container input {
            flex: 1;
            padding: 18px 24px;
            font-size: 18px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .input-container input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-container input:focus {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .input-container .btn {
            margin: 0;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .result {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .result h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }

        .hexagram-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }

        .hexagram {
            text-align: center;
            margin: 20px 0;
        }

        .hexagram-symbol {
            font-size: 42px;
            margin: 15px 0;
            line-height: 1.3;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .hexagram-symbol .line {
            display: block;
            width: 100%;
            text-align: center;
            white-space: pre;
        }

        .hexagram-symbol .yang {
            letter-spacing: 6px;
        }

        .hexagram-symbol .yin {
            letter-spacing: 2px;
        }

        .hexagram-name {
            font-size: 36px;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .hexagram-text {
            font-size: 20px;
            color: #fff;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            border-left: 4px solid #ffd700;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .analysis-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .analysis-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .analysis-card h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .analysis-card .score {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .score-high { color: #00ff88; }
        .score-medium { color: #ffd700; }
        .score-low { color: #ff6b6b; }

        .analysis-card p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
        }

        .interpretation {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-top: 25px;
            line-height: 1.8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .interpretation h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .history {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .history h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ffd700;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .history-item small {
            color: #888;
            display: block;
            margin-bottom: 8px;
        }

        .history-item .history-name {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .history-item .history-analysis {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            font-size: 13px;
        }

        .clear-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #c0392b 100%);
            margin-top: 20px;
        }

        .clear-btn:hover {
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .loading::after {
            content: '占卜中...';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .hexagram-symbol {
                font-size: 32px;
            }

            .hexagram-name {
                font-size: 28px;
            }

            .analysis-grid {
                grid-template-columns: 1fr;
            }

            .history-item .history-analysis {
                grid-template-columns: 1fr;
            }

            .bagua {
                width: 200px;
                height: 200px;
            }

            .bagua-yin-yang {
                width: 100px;
                height: 100px;
            }

            .bagua-yin-yang::before {
                width: 80px;
                height: 80px;
            }

            .bagua-yin-yang::after {
                font-size: 40px;
            }

            .bagua-trigram {
                font-size: 16px;
            }

            .tab-container {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }

            .palace-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stars-list {
                grid-template-columns: repeat(2, 1fr);
            }

            .input-row {
                flex-direction: column;
            }

            .input-container {
                flex-direction: column;
            }

            .input-container input {
                width: 100%;
            }

            .input-container .btn {
                width: 100%;
            }

            .bagua::before {
                font-size: 80px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☯ 蹇杨的工具 ☯</h1>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('yijing')">易经占卜</button>
            <button class="tab-btn" onclick="switchTab('ziwei')">紫微斗数</button>
        </div>

        <div id="yijing-section">
        <div class="bagua-container">
            <div class="bagua">
                <div class="bagua-ring"></div>
                <div class="bagua-ring"></div>
                <div class="bagua-ring"></div>
                <div class="bagua-ring"></div>
                <div class="bagua-ring"></div>
                <div class="bagua-yin-yang"></div>
                <div class="bagua-trigrams">
                    <div class="bagua-trigram">☰</div>
                    <div class="bagua-trigram">☱</div>
                    <div class="bagua-trigram">☲</div>
                    <div class="bagua-trigram">☳</div>
                    <div class="bagua-trigram">☴</div>
                    <div class="bagua-trigram">☵</div>
                    <div class="bagua-trigram">☶</div>
                    <div class="bagua-trigram">☷</div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="divinationInput" placeholder="请输入想要占卜的事项（人物、物件、时间、问题等）..." onkeypress="handleKeyPress(event)">
            <button class="btn" onclick="generateHexagram()">开始占卜</button>
        </div>

        <div class="loading" id="loading"></div>

        <div class="result" id="result">
            <h2>✧ 占卜结果 ✧</h2>
            <div class="hexagram-display">
                <div class="hexagram-name" id="hexagramName">等待占卜...</div>
                <div class="hexagram-symbol" id="hexagramSymbol">
                    <span class="yin">━ ━</span><br>
                    <span class="yang">━━━━━━</span><br>
                    <span class="yin">━ ━</span><br>
                    <span class="yang">━━━━━━</span><br>
                    <span class="yin">━ ━</span><br>
                    <span class="yang">━━━━━━</span>
                </div>
                <div class="hexagram-text" id="hexagramText">点击开始占卜按钮获取卦象</div>
            </div>

            <div class="analysis-grid" id="analysisGrid">
                <div class="analysis-card">
                    <h3>🌟 时运</h3>
                    <div class="score score-medium" id="fortuneScore">--</div>
                    <p id="fortuneText">等待分析...</p>
                </div>
                <div class="analysis-card">
                    <h3>💰 财运</h3>
                    <div class="score score-medium" id="wealthScore">--</div>
                    <p id="wealthText">等待分析...</p>
                </div>
                <div class="analysis-card">
                    <h3>💑 姻缘</h3>
                    <div class="score score-medium" id="loveScore">--</div>
                    <p id="loveText">等待分析...</p>
                </div>
            </div>

            <div class="interpretation" id="interpretation">
                <h3>✧ 卦象详解 ✧</h3>
                <p>点击开始占卜按钮获取卦象的详细解释和人生启示</p>
            </div>
        </div>

        <div class="history">
            <h2>📜 历史记录</h2>
            <div class="history-list" id="historyList">
                <p style="color: #888; text-align: center;">暂无历史记录</p>
            </div>
            <button class="btn clear-btn" onclick="clearHistory()">清空历史记录</button>
        </div>
        </div>

        <div id="ziwei-section" style="display: none;">
            <div class="ziwei-input-container">
                <h2>🍀 紫微斗数排盘 🍀</h2>
                <div class="input-row">
                    <div class="input-group">
                        <label>姓名</label>
                        <input type="text" id="name" placeholder="请输入姓名">
                    </div>
                    <div class="input-group">
                        <label>出生年份</label>
                        <input type="number" id="birthYear" placeholder="如：1990" min="1900" max="2100">
                    </div>
                    <div class="input-group">
                        <label>出生月份</label>
                        <input type="number" id="birthMonth" placeholder="1-12" min="1" max="12">
                    </div>
                    <div class="input-group">
                        <label>出生日期</label>
                        <input type="number" id="birthDay" placeholder="1-31" min="1" max="31">
                    </div>
                    <div class="input-group">
                        <label>出生时辰</label>
                        <select id="birthHour">
                            <option value="0">子时(23-01)</option>
                            <option value="1">丑时(01-03)</option>
                            <option value="2">寅时(03-05)</option>
                            <option value="3">卯时(05-07)</option>
                            <option value="4">辰时(07-09)</option>

        function getGanZhi(year, month, day, hour) {
            const baseYear = 1984;
            const baseGanZhiIndex = 0;

            // 计算年柱
            const yearDiff = year - baseYear;
            let yearGanIndex = (baseGanZhiIndex + yearDiff) % 10;
            let yearZhiIndex = (baseGanZhiIndex + yearDiff) % 12;
            if (yearGanIndex < 0) yearGanIndex += 10;
            if (yearZhiIndex < 0) yearZhiIndex += 12;

            // 计算月柱（简化算法，实际需要考虑节气）
            const monthBase = [0, 3, 3, 6, 9, 11, 14, 16, 19, 22, 24, 27];
            let monthGanIndex = (yearGanIndex * 2 + monthBase[month - 1]) % 10;
            let monthZhiIndex = (month - 1) % 12;
            if (monthGanIndex < 0) monthGanIndex += 10;

            // 计算日柱
            const totalDays = Math.floor((new Date(year, month - 1, day) - new Date(1900, 0, 1)) / 86400000);
            const dayGanIndex = (totalDays + 1) % 10;
            const dayZhiIndex = (totalDays + 1) % 12;

            // 计算时柱
            const hourZhiIndex = hour % 12;
            const hourGanIndex = (dayGanIndex * 2 + hourZhiIndex) % 10;

            return {
                year: TIANGAN[yearGanIndex] + DIZHI[yearZhiIndex],
                month: TIANGAN[monthGanIndex] + DIZHI[monthZhiIndex],
                day: TIANGAN[dayGanIndex] + DIZHI[dayZhiIndex],
                hour: TIANGAN[hourGanIndex] + DIZHI[hourZhiIndex]
            };
        }

        function getWuXing(gz) {
            const wuxing = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
            const wuxingCycle = {
                '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土',
                '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水'
            };

            for (let char of gz) {
                if (wuxingCycle[char]) {
                    wuxing[wuxingCycle[char]]++;
                }
            }

            let dominant = '木';
            let maxCount = 0;
            for (let key in wuxing) {
                if (wuxing[key] > maxCount) {
                    maxCount = wuxing[key];
                    dominant = key;
                }
            }

            return { wuxing, dominant };
        }

        function calculateSiHua(year, month, day, gender) {
            const yearLastDigit = year % 10;
            const dayLastDigit = day % 10;

            const luLocation = SI_HUA.location[yearLastDigit];
            const quanLocation = (luLocation + 1) % 12;
            const keLocation = (luLocation + 2) % 12;
            const jiLocation = (luLocation + 3) % 12;

            const genderOffset = gender === 'male' ? 1 : -1;

            return {
                '化禄': (luLocation * genderOffset + 12) % 12,
                '化权': (quanLocation * genderOffset + 12) % 12,
                '化科': (keLocation * genderOffset + 12) % 12,
                '化忌': (jiLocation * genderOffset + 12) % 12
            };
        }

        function assignPalaces(year, month, day, hour, gender) {
            const ganZhi = getGanZhi(year, month, day, hour);
            const wuxing = getWuXing(ganZhi.year + ganZhi.month + ganZhi.day + ganZhi.hour);
            const siHua = calculateSiHua(year, month, day, gender);

            const mainStars = ZIWEI_STARS.main;
            const assistantStars = ZIWEI_STARS.assistant;

            // 基于多个因素计算基础值
            const yearBase = year % 12;
            const monthBase = month % 12;
            const dayBase = day % 12;
            const hourBase = hour % 12;
            const genderFactor = gender === 'male' ? 1 : 5;
            
            // 计算综合基础值
            const baseValue = (yearBase * 1000 + monthBase * 100 + dayBase * 10 + hourBase + genderFactor) % 12;

            const starAssignments = [];
            for (let i = 0; i < 12; i++) {
                starAssignments.push({
                    palace: PALACE_NAMES[i],
                    mainStar: null,
                    assistantStars: [],
                    maleficStars: [],
                    siHua: [],
                    ganZhi: ganZhi.year + ganZhi.month + ganZhi.day + ganZhi.hour
                });
            }

            // 分配主星
            mainStars.forEach((star, idx) => {
                const location = (baseValue + idx * 3) % 12;
                starAssignments[location].mainStar = star;
            });

            // 分配辅星
            assistantStars.forEach((star, idx) => {
                const location = (baseValue + idx * 2 + 1) % 12;
                starAssignments[location].assistantStars.push(star);
            });

            // 分配煞星
            ZIWEI_STARS.malefic.forEach((star, idx) => {
                const location = (baseValue + idx * 4 + 3) % 12;
                starAssignments[location].maleficStars.push(star);
            });

            // 分配四化星
            for (let hua in siHua) {
                starAssignments[siHua[hua]].siHua.push(hua);
            }

            return {
                ganZhi,
                wuxing,
                siHua,
                palaces: starAssignments
            };
        }

        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'yijing') {
                document.getElementById('yijing-section').style.display = 'block';
                document.getElementById('ziwei-section').style.display = 'none';
            } else {
                document.getElementById('yijing-section').style.display = 'none';
                document.getElementById('ziwei-section').style.display = 'block';
            }
        }

        function calculateZiwei() {
            const name = document.getElementById('name').value.trim();
            const year = parseInt(document.getElementById('birthYear').value);
            const month = parseInt(document.getElementById('birthMonth').value);
            const day = parseInt(document.getElementById('birthDay').value);
            const hour = parseInt(document.getElementById('birthHour').value);
            const gender = document.getElementById('gender').value;

            if (!year || !month || !day) {
                alert('请输入完整的出生日期');
                return;
            }

            const result = assignPalaces(year, month, day, hour, gender);

            document.getElementById('ziweiTitle').textContent = name ? `${name}的紫微斗数命盘` : '紫微斗数命盘';
            document.getElementById('ziweiInfo').textContent =
                (name ? `姓名：${name} | ` : '') +
                `出生日期：${year}年${month}月${day}日${DIZHI[hour]}时 | ` +
                `性别：${gender === 'male' ? '男' : '女'} | ` +
                `八字：${result.ganZhi.year}年 ${result.ganZhi.month}月 ${result.ganZhi.day}日 ${result.ganZhi.hour}时 | ` +
                `五行：${result.wuxing.dominant}旺`;

            const palaceGrid = document.getElementById('palaceGrid');
            palaceGrid.innerHTML = result.palaces.map((p, idx) => `
                <div class="palace-card">
                    <div class="palace-name">${p.palace}</div>
                    <div class="palace-stars">
                        ${p.mainStar ? `<span class="star" style="color: #ffd700;">${p.mainStar}</span>` : ''}
                        ${p.assistantStars.map(s => `<span class="star zhang">${s}</span>`).join('')}
                        ${p.maleficStars.map(s => `<span class="star" style="color: #888;">${s}</span>`).join('')}
                        ${p.siHua.map(h => `<span class="star hua">${h}</span>`).join('')}
                    </div>
                </div>
            `).join('');

            const starsList = document.getElementById('starsList');
            const allStars = {};
            result.palaces.forEach((p, idx) => {
                if (p.mainStar) {
                    allStars[p.mainStar] = p.palace;
                }
                p.assistantStars.forEach(s => {
                    allStars[s] = p.palace;
                });
            });

            starsList.innerHTML = Object.entries(allStars).slice(0, 12).map(([star, location]) => `
                <div class="star-item">
                    <div class="star-name">${star}</div>
                    <div class="star-location">${location}</div>
                </div>
            `).join('');

            const analysis = result.palaces.map((p, idx) => `
                <div class="item">
                    <h4>${p.palace}</h4>
                    <p>${getPalaceAnalysis(p.palace, result.palaces[idx])}</p>
                </div>
            `).join('');

            document.getElementById('ziweiAnalysis').innerHTML = analysis;
            document.getElementById('ziweiResult').style.display = 'block';
        }

        function init() {
            loadHistory();
        }

        function getScoreClass(score) {
            if (score >= 80) return 'score-high';
            if (score >= 60) return 'score-medium';
            return 'score-low';
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                generateHexagram();
            }
        }

        function generateHexagram() {
            const input = document.getElementById('divinationInput');
            const userInput = input.value.trim();

            if (!userInput) {
                input.style.borderColor = '#ff6b6b';
                input.focus();
                setTimeout(() => {
                    input.style.borderColor = 'rgba(255, 215, 0, 0.3)';
                }, 1000);
                return;
            }

            const loading = document.getElementById('loading');
            loading.classList.add('show');

            setTimeout(() => {
                const hash = hashCode(userInput);
                const index = hash % hexagrams.length;
                const hexagram = hexagrams[index];

                const lines = hexagram.symbol.split('\n');
                const symbolHtml = lines.map(line => {
                    const isYang = line.includes('━') && !line.includes(' ');
                    const className = isYang ? 'yang' : 'yin';
                    return `<span class="${className}">${line}</span>`;
                }).join('<br>');
                document.getElementById('hexagramSymbol').innerHTML = symbolHtml;
                document.getElementById('hexagramName').textContent = hexagram.name;
                document.getElementById('hexagramText').textContent = hexagram.text;

                document.getElementById('fortuneScore').textContent = hexagram.fortune.score;
                document.getElementById('fortuneScore').className = 'score ' + getScoreClass(hexagram.fortune.score);
                document.getElementById('fortuneText').innerHTML = hexagram.fortune.text + 
                    (hexagram.fortune.score < 70 ? `<br><span style="color: #ff9800; font-size: 14px; margin-top: 8px; display: inline-block;">💡 建议：${hexagram.fortune.solution}</span>` : '');

                document.getElementById('wealthScore').textContent = hexagram.wealth.score;
                document.getElementById('wealthScore').className = 'score ' + getScoreClass(hexagram.wealth.score);
                document.getElementById('wealthText').innerHTML = hexagram.wealth.text + 
                    (hexagram.wealth.score < 70 ? `<br><span style="color: #ff9800; font-size: 14px; margin-top: 8px; display: inline-block;">💡 建议：${hexagram.wealth.solution}</span>` : '');

                document.getElementById('loveScore').textContent = hexagram.love.score;
                document.getElementById('loveScore').className = 'score ' + getScoreClass(hexagram.love.score);
                document.getElementById('loveText').innerHTML = hexagram.love.text + 
                    (hexagram.love.score < 70 ? `<br><span style="color: #ff9800; font-size: 14px; margin-top: 8px; display: inline-block;">💡 建议：${hexagram.love.solution}</span>` : '');

                document.getElementById('interpretation').innerHTML = `
                    <h3>✧ 卦象详解 ✧</h3>
                    <p>${hexagram.interpretation}</p>
                `;

                saveToHistory(userInput, hexagram);
                loading.classList.remove('show');
            }, 1000);
        }

        function saveToHistory(userInput, hexagram) {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const record = {
                id: Date.now(),
                time: new Date().toLocaleString(),
                question: userInput,
                name: hexagram.name,
                text: hexagram.text,
                interpretation: hexagram.interpretation,
                fortune: hexagram.fortune,
                wealth: hexagram.wealth,
                love: hexagram.love
            };
            history.unshift(record);
            if (history.length > 20) {
                history.pop();
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                historyList.innerHTML = '<p style="color: #888; text-align: center;">暂无历史记录</p>';
                return;
            }

            historyList.innerHTML = history.map(record => `
                <div class="history-item">
                    <small>${record.time}</small>
                    <div style="color: #aaa; font-size: 14px; margin: 5px 0;">问：${record.question}</div>
                    <div class="history-name">${record.name}</div>
                    <p style="color: #ccc; margin: 5px 0;">${record.text}</p>
                    <div class="history-analysis">
                        <div>
                            <span style="color: #ffd700;">时运</span>:
                            <span class="${getScoreClass(record.fortune.score)}">${record.fortune.score}分</span>
                        </div>
                        <div>
                            <span style="color: #ffd700;">财运</span>:
                            <span class="${getScoreClass(record.wealth.score)}">${record.wealth.score}分</span>
                        </div>
                        <div>
                            <span style="color: #ffd700;">姻缘</span>:
                            <span class="${getScoreClass(record.love.score)}">${record.love.score}分</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function clearHistory() {
            if (confirm('确定要清空历史记录吗？')) {
                localStorage.removeItem(STORAGE_KEY);
                loadHistory();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
